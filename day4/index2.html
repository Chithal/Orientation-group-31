<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCSC Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo-area">
            <img src="https://avatars.githubusercontent.com/u/6937151?s=280&v=4" alt="UCSC Logo" class="logo" onerror="this.src='https://via.placeholder.com/50'">
            <h2>UCSC Student Dashboard</h2>
        </div>
        <div class="menu">
            <button onclick="showPage('gpa')">GPA Calculator</button>
            <button onclick="showPage('timer')">Study Timer</button>
            <div class="theme-switch-wrapper">
                <span>Dark Mode</span>
                <label class="switch">
                    <input type="checkbox" id="dark-mode-toggle" onclick="toggleDark()">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
    </nav>

    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h3>Upcoming Events</h3>
            <div class="event">📚 Assignment Submission</div>
            <div class="event">👥 Group Meeting</div>
            <div class="event">📝 Exam Preparation</div>
            <div class="event">🏆 Sports Day</div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main">

            <!-- GPA Calculator Section -->
            <section id="gpa" class="card">
                <h2>GPA Calculator</h2>
                <div class="input-group">
                    <input type="number" id="credits" placeholder="Course Credits" min="1">
                    <input type="number" id="grade" placeholder="Grade (0.0 - 4.0)" min="0" max="4" step="0.1">
                </div>
                <div class="button-group">
                    <button onclick="addCourse()">Add Course</button>
                    <button onclick="calculate()">Calculate GPA</button>
                    <button onclick="resetGPA()" style="background: #555;">Reset</button>
                </div>
                <div id="course-list" style="margin-top: 15px; max-height: 100px; overflow-y: auto; text-align: left; padding: 0 20px;"></div>
                <p id="result">GPA: 0.00</p>
            </section>

            <!-- Pomodoro Study Timer Section -->
            <section id="timer" class="card" style="display:none">
                <h2>Pomodoro Study Timer</h2>
                <div class="timer" id="time">25:00</div>
                <div class="timer-controls">
                    <button onclick="startTimer()">Start</button>
                    <button onclick="resetTimer()">Reset</button>
                </div>
                <p style="margin-top: 15px; font-size: 14px; color: #666;">Stay focused for 25 minutes!</p>
            </section>

        </main>
    </div>

    <audio id="bell-sound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
